services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode configuration
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Listeners
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Single-node performance optimizations
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
    networks:
      - otie-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
    networks:
      - otie-network

  init-kafka:
    image: apache/kafka:3.7.0
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      # Wait until kafka is reachable
      while ! /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list ; do
        echo 'Waiting for Kafka to be ready...'
        sleep 2
      done
      echo -e 'Creating kafka topics'
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic raw-events --replication-factor 1 --partitions 3
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic processed-events --replication-factor 1 --partitions 3
      echo -e 'Successfully created the following topics:'
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    networks:
      - otie-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=otie_user
      - POSTGRES_PASSWORD=otie_password
      - POSTGRES_DB=otie_db
    networks:
      - otie-network

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    networks:
      - otie-network

  collector:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.collector
    container_name: collector
    ports:
      - "50051:50051"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=raw-events
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - otie-network

  processor:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.processor
    container_name: processor
    ports:
      - "50052:50052"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_IN_TOPIC=raw-events
      - KAFKA_OUT_TOPIC=processed-events
      - GRPC_PORT=50052
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      collector:
        condition: service_started
    networks:
      - otie-network

networks:
  otie-network:
    driver: bridge
