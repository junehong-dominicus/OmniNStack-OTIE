name: CI for OTIE Platform
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      registry:
        description: 'Docker Registry to build/push to'
        required: true
        default: 'omninstack-otie-collector'
        type: choice
        options:
          - 'omninstack-otie-collector'
          - 'ghcr.io/junehong-dominicus/omninstack-otie-collector'
          - 'docker.io/junehongdominicus/omninstack-otie-collector'

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          
      - name: Fetch dependencies
        run: go mod tidy
        
      - name: Code Quality & Tests
        run: go test ./... -v
        
  docker-build:
    runs-on: ubuntu-latest
    needs: test-go
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Collector Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.collector
          push: false
          tags: ${{ github.event.inputs.registry || 'omninstack-otie-collector' }}:latest
