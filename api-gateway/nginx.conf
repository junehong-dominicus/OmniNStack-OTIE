worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout  65;

    upstream collector {
        server otie-collector-service:50051;
    }

    upstream ml_engine {
        server otie-ml-engine-service:8000;
    }

    server {
        listen 80;
        http2 on; # Enable HTTP/2 for gRPC support
        server_name otie.local;

        # Health check
        location /health {
            return 200 'gateway_healthy';
        }

        # OTIE Collector (gRPC)
        location /api/v1/ingest {
            grpc_pass grpc://collector;
        }

        # OTIE AI Inference
        location /api/v1/predict/ {
            proxy_pass http://ml_engine/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OTIE Admin Dashboard Placeholder
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}

